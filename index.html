<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atmosfera — Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="app">
    <div class="glass-card">

      <header class="app-header">
        <div class="logo">
          <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>
            <path d="M14 2V5M14 23V26M2 14H5M23 14H26M5.5 5.5L7.6 7.6M20.4 20.4L22.5 22.5M22.5 5.5L20.4 7.6M7.6 20.4L5.5 22.5" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
          </svg>
          <span>atmosfera</span>
        </div>
        <p class="tagline">Real-time weather, beautifully displayed</p>
      </header>

      <form id="searchForm" class="search-box" autocomplete="off">
        <div class="input-wrapper">
          <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="text"
            id="cityInput"
            placeholder="Search for a city…"
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" class="btn-search">
          <span>Search</span>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <div id="message" class="message"></div>

      <section id="weatherResult" class="weather-result hidden">

        <div class="current-weather">
          <div class="weather-icon-big" id="weatherIconBig">☀️</div>
          <div class="city-info">
            <h2 id="cityName">—</h2>
            <p id="weatherDesc">—</p>
          </div>
          <div class="temp-block">
            <span id="temperature" class="temp-main">—</span>
            <span class="temp-unit">°C</span>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-pill">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
            <div class="stat-text">
              <span class="stat-label">Wind</span>
              <span class="stat-value" id="wind">—</span>
            </div>
          </div>
          <div class="stat-pill">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v13.5"/><path d="M12 2a4 4 0 0 1 4 4v6.5a6 6 0 1 1-8 0V6a4 4 0 0 1 4-4"/></svg>
            <div class="stat-text">
              <span class="stat-label">Humidity</span>
              <span class="stat-value" id="humidity">—</span>
            </div>
          </div>
          <div class="stat-pill">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
            <div class="stat-text">
              <span class="stat-label">Feels Like</span>
              <span class="stat-value" id="feelsLike">—</span>
            </div>
          </div>
        </div>

        <div class="forecast-section">
          <h3 class="section-title">5-Day Forecast</h3>
          <div id="forecast" class="forecast-grid"></div>
        </div>

      </section>

      <div id="emptyState" class="empty-state">
        <div class="empty-icon">🌍</div>
        <p>Type a city name above to get started</p>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
